<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events - Bat gear</title>
  <link rel="stylesheet" href="Home.css" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@100;400;700&display=swap" rel="stylesheet">

  <style>
    /* ================= POPUP OVERLAY ================= */
    .popup-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; 
      height: 100%;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(5px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }

    /* ================= POPUP BOX ================= */
    .popup-box {
      width: 420px;
      background: rgba(0,0,0,0.80);
      border-radius: 16px;
      padding: 30px;
      color: white;
      font-family: 'Raleway', sans-serif;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      animation: popupFade 0.35s ease;
    }

    @keyframes popupFade {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .popup-box h2 {
      font-weight: 300;
      margin-bottom: 20px;
      letter-spacing: 0.1rem;
    }

    .popup-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      outline: none;
      font-size: 14px;
    }

    .popup-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid white;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      letter-spacing: 0.1rem;
    }

    .popup-btn:hover {
      background: white;
      color: black;
      transform: scale(1.03);
    }

    .close-popup {
      text-align: right;
      font-size: 24px;
      cursor: pointer;
      margin-top: -10px;
      margin-bottom: 5px;
    }
  </style>

</head>
<body>

<!-- ===================== Side Panel ====================== -->
<div id="sidePanel" class="side-panel">
  <button class="close-btn" onclick="closePanel()">×</button>
  <a href="home.html">Home</a>
  <a href="Dashboard.html">Dashboard</a>
  <a href="Subsciption.html">Membership</a>
  <a href="Garage.html">Garage</a>
  <a href="contactus.html">Contact Us</a>
</div>

<!-- ===================== Navbar ====================== -->
<nav class="navbar">
  <div class="menu-icon" onclick="openPanel()">☰</div>
  <div class="back-btn" onclick="window.history.back()" title="Go Back">←</div>
  <h1 class="logo">B A T &nbsp; G E A R</h1>
</nav>

<!-- ===================== Events Section ====================== -->
<section class="stories">
  <div class="stories-header">
    <h2>EVENTS</h2>
    <a class="read-all" style="cursor:pointer;">Notify Me !</a>
  </div>

  <div id="dynamicEventsContainer" style="display: flex; flex-direction: column; gap: 40px; margin-top: 30px;">
      <!-- JavaScript will inject dynamically generated grid layouts here from MongoDB -->
      <div style="text-align:center; color:rgba(255,255,255,0.5); padding: 50px;">Fetching Live Events...</div>
  </div>
</section>

<!-- ===================== POPUP MODAL ====================== -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <div class="close-popup" onclick="closePopup()">×</div>

    <h2>Get Notified About Events</h2>

    <form id="notifyForm" onsubmit="submitNotify(event)">
      <input type="text" id="notifyName" placeholder="Your Name" required>
      <input type="email" id="notifyEmail" placeholder="Your Email" required>
      <button type="submit" class="popup-btn">Notify Me</button>
    </form>
  </div>
</div>

<script>
  /* =================== Side Panel =================== */
  function openPanel() {
    document.getElementById('sidePanel').style.left = '0';
  }

  function closePanel() {
    document.getElementById('sidePanel').style.left = '-250px';
  }

  /* =================== Open Popup =================== */
  document.querySelector(".read-all").addEventListener("click", () => {
    document.getElementById("popupOverlay").style.display = "flex";
  });

  /* =================== Close Popup =================== */
  function closePopup() {
    document.getElementById("popupOverlay").style.display = "none";
  }

  /* =================== Send Notification Request =================== */
  async function submitNotify(event) {
    if (event) event.preventDefault();
    const name    = document.getElementById("notifyName").value.trim();
    const email   = document.getElementById("notifyEmail").value.trim();
    const btn     = document.querySelector(".popup-btn");

    if (!name || !email) {
      alert("Please fill out both fields.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Subscribing…";

    try {
      const res  = await fetch("http://localhost:5501/api/notify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email }),
      });
      const data = await res.json();

      if (res.ok) {
        // Replace form content with success state
        document.querySelector(".popup-box").innerHTML = `
          <div style="text-align:center; padding: 20px 0; color:white; font-family:'Raleway',sans-serif;">
            <div style="font-size:40px; margin-bottom:16px;">✓</div>
            <h3 style="font-weight:300; font-size:1.3rem; margin-bottom:10px;">You're on the list.</h3>
            <p style="color:rgba(255,255,255,0.6); font-size:0.88rem; line-height:1.7;">Check your inbox — we've sent a confirmation.<br>You'll be first to know about Bat Gear events.</p>
            <button onclick="closePopup()" style="margin-top:24px; padding:10px 32px; background:white; color:black; border:none; border-radius:8px; font-family:'Raleway',sans-serif; font-weight:700; font-size:0.8rem; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer;">Done</button>
          </div>`;
      } else {
        btn.disabled = false;
        btn.textContent = "Notify Me";
        alert(data.error || "Subscription failed. Please try again.");
      }
    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.textContent = "Notify Me";
      alert("Network Error.");
    }
  }

  /* =================== Dynamic Events Fetcher =================== */
  async function loadDynamicEvents() {
    const container = document.getElementById("dynamicEventsContainer");
    try {
      const res = await fetch("http://localhost:5501/api/events");
      const data = await res.json();
      
      if(data.events && data.events.length > 0) {
        container.innerHTML = "";
        
        // Group events into rows of 3
        let html = "";
        for(let i = 0; i < data.events.length; i += 3) {
           const rowEvents = data.events.slice(i, i + 3);
           
           html += `<div class="story-cards">`;
           rowEvents.forEach(e => {
             // Fallback image if none specified
             const imgSrc = e.image ? e.image : "template/trackday.png";
             const dateObj = new Date(e.date);
             const dateStr = dateObj.toLocaleDateString("en-US", { day: 'numeric', month: 'long', year: 'numeric' });
             
             html += `
              <div class="story-card">
                <img src="${imgSrc}" alt="${e.title}" onerror="this.src='template/garage1.png';" />
                <div class="story-card-content">
                  <p class="category">${e.title}</p>
                  <h3 style="min-height:45px;">${e.description}</h3>
                  <p class="date">${dateStr}</p>
                </div>
              </div>
             `;
           });
           html += `</div>`;
        }
        
        container.innerHTML = html;
        
      } else {
        container.innerHTML = `<div style="text-align:center; padding:100px; color:rgba(255,255,255,0.4);">No upcoming events scheduled. Stay tuned!</div>`;
      }
    } catch(err) {
      console.error("Failed to load events:", err);
      container.innerHTML = `<div style="text-align:center; padding:100px; color:rgba(255,100,100,0.8);">Error connecting to database.</div>`;
    }
  }

  // Load immediately on screen rendering
  window.addEventListener("DOMContentLoaded", loadDynamicEvents);

</script>

</body>
</html>
